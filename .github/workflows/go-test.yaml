name: go-test

on:
  push:
    branches: ["main", "devel"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install libav*
        run: sudo apt-get install -y libavutil-dev libavcodec-dev libavformat-dev
      - name: Cover
        run: go test -v ./... -cover
      - name: Race
        run: go test -v ./... -race
      - name: Bench
        run: go test -v ./... -benchmem -bench=.

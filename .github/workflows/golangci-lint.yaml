name: golangci-lint

on:
  push:
    branches: ["main", "devel"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install libav*
        run: |
          sudo apt-get update && \
          sudo apt-get install --no-install-recommends -y libavutil-dev libavcodec-dev libavformat-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --verbose

services:
  gocast:
    build: .
    command: -service.debounce=3s
    ports:
      - 8080:8080
      - 8000:8000

  foo:
    image: jrottenberg/ffmpeg
    command: |
      -hide_banner
      -re -f lavfi -i sine=f=440
      -f mp3 http://gocast:8080/streams/foo
    depends_on:
      - gocast

  bar:
    image: jrottenberg/ffmpeg
    command: |
      -hide_banner
      -re -f lavfi -i sine=f=660
      -f adts icecast://gocast:8000/bar
    depends_on:
      - gocast

  bar-leg:
    image: jrottenberg/ffmpeg
    command: |
      -hide_banner
      -re -f lavfi -i sine=f=660
      -f adts -legacy_icecast 1 icecast://gocast:8000/bar-leg
    depends_on:
      - gocast

  baz:
    image: jrottenberg/ffmpeg
    command: |
      -hide_banner
      -re -f lavfi -i sine=f=880
      -f adts srt://gocast:6000?streamid=pub:baz
    depends_on:
      - gocast
